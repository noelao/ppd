<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        @font-face {
            font-family: mobbin;
            src: url(../../public/fonts/mobbin.woff2);
        }
    </style>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        body {
            font-family: mobbin;
        }
        .container {
            width: 100%;
            min-height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;
        }
        .poster {
            border: solid 1px #000;
            width: 100%;
            aspect-ratio: 1;

            display: flex;
            justify-content: center;
            align-items: center;

            .kotak {
                width: 70%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="poster">

            <div class="kotak">
                <p>apa yang terjadi kalau presiden lengser ?</p>
                <p>maka wakil presiden akan menggantikan kekosongan jabatan.</p>
                <p>bgaimana kalau ini adalah hal yang disengaja ? direkayasa.</p>
            </div>
        </div>
    </div>
</body>
</html>
